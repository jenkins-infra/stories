<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Clean gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Clean background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  
  <!-- Modern car key icon -->
  <g transform="translate(16, 16)">
    <!-- Key fob (simplified) -->
    <rect x="-6" y="-8" width="12" height="8" rx="3" fill="#374151" filter="url(#softShadow)"/>
    
    <!-- Key buttons (minimal) -->
    <circle cx="-3" cy="-6" r="1.5" fill="#ef4444" opacity="0.9"/>
    <circle cx="0" cy="-6" r="1.5" fill="#10b981" opacity="0.9"/>
    <circle cx="3" cy="-6" r="1.5" fill="#f59e0b" opacity="0.9"/>
    
    <!-- Key blade (clean) -->
    <rect x="-1.5" y="0" width="3" height="10" rx="1" fill="url(#keyGrad)" filter="url(#softShadow)"/>
    
    <!-- Key teeth (minimal) -->
    <rect x="-1.5" y="6" width="1" height="1.5" fill="url(#keyGrad)"/>
    <rect x="-1.5" y="8" width="1.5" height="1" fill="url(#keyGrad)"/>
    
    <!-- Key tip -->
    <polygon points="0,10 1.5,9.5 1.5,10.5" fill="url(#keyGrad)"/>
  </g>
  
  <!-- Minimal brand mark -->
  <text x="26" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="4" font-weight="600" fill="rgba(255,255,255,0.9)">F</text>
</svg>