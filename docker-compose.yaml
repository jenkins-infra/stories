services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      
    container_name: stories-web

    ports:
      - "8000:8000"

    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: "development"
      TZ: "UTC"
      GATSBY_CPU_COUNT: "4"
      GATSBY_CACHE_DIR: "/app/.gatsby-cache"
      GATSBY_INTERNAL_CACHE_DIR: "/app/.cache"
      GATSBY_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--no-warnings"

    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - stories_node_modules:/app/node_modules
      - stories_cache:/app/.gatsby-cache
      - stories_internal_cache:/app/.cache

    command: ["npm", "run", "develop", "--", "-H", "0.0.0.0", "-p", "8000"]

    user: "${UID:-1000}:${GID:-1000}"

    networks:
      - stories-network

networks:
  stories-network:

volumes:
  stories_cache:
  stories_internal_cache:
  stories_node_modules:
