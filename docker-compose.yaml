services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24.13.0}
    image: gatsby-web:latest
    platform: linux/arm64
    container_name: gatsby-web
    ports:
      - "8000:8000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: "development"
      GATSBY_CPU_COUNT: "1"
      GATSBY_CACHE_DIR: "/app/.gatsby-cache"
      GATSBY_INTERNAL_CACHE_DIR: "/app/.cache"
      GATSBY_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--no-warnings"
    deploy:
      resources:
        limits:
          memory: 2g    
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - gatsby_cache:/app/.gatsby-cache
      - gatsby_internal_cache:/app/.cache
    command: ["npm", "run", "develop", "--", "-H", "0.0.0.0", "-p", "8000"]
    user: root
    networks:
      - gatsby-network

networks:
  gatsby-network:

volumes:
  gatsby_cache:
  gatsby_internal_cache:
